<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Freshworks Currency Switcher</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 240px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
        'Helvetica Neue', Arial, sans-serif;
      background: #ffffff;
      color: #1a1a2e;
    }

    .header {
      background: #1a1a2e;
      color: #ffffff;
      padding: 16px 18px;
    }

    .header-title {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .header-sub {
      font-size: 11px;
      opacity: 0.55;
      margin-top: 3px;
    }

    .currencies {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .currency-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #e5e5e5;
      background: #ffffff;
      border-radius: 9px;
      cursor: pointer;
      text-align: left;
      font-family: inherit;
      color: #333;
      transition: border-color 0.14s, background 0.14s, color 0.14s;
    }

    .currency-btn:hover {
      border-color: #1a1a2e;
      background: #f8f8ff;
    }

    .currency-btn.active {
      border-color: #1a1a2e;
      background: #1a1a2e;
      color: #ffffff;
    }

    .currency-symbol {
      font-size: 17px;
      font-weight: 800;
      width: 26px;
      text-align: center;
      flex-shrink: 0;
    }

    .currency-info { flex: 1; }

    .currency-code {
      font-size: 13px;
      font-weight: 700;
    }

    .currency-name {
      font-size: 11px;
      opacity: 0.55;
      margin-top: 1px;
    }

    .not-on-page {
      padding: 24px 18px;
      text-align: center;
      color: #888;
      font-size: 12px;
      line-height: 1.6;
    }

    .not-on-page-icon {
      font-size: 30px;
      margin-bottom: 10px;
    }

    .footer {
      border-top: 1px solid #f0f0f0;
      padding: 9px 14px;
      font-size: 10px;
      color: #c0c0c0;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-title">💱 Currency Switcher</div>
    <div class="header-sub">Freshworks Pricing Viewer</div>
  </div>
  <div id="main"></div>
  <div class="footer">Reads page data · No external calls</div>
  <script src="popup.js"></script>
</body>
</html>
